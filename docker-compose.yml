services:
  app:
    build:
      context: .
      target: app
    ports:
      - "8000:8000"
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
      VIPS_WARNING: "0"
      # Set a path prefix when deploying behind a reverse proxy at a sub-directory.
      # Example: ROOT_PATH=/image-server  → service reachable at /image-server/compress
      ROOT_PATH: ""
    restart: unless-stopped
