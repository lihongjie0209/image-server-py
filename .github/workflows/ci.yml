name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: build the app image and run the full test suite inside it
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest in Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build test image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          target: app
          load: true            # load into local daemon (not push)
          tags: image-server-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pytest
        run: |
          mkdir -p reports
          docker run --rm \
            -v "${{ github.workspace }}/reports:/app/reports" \
            image-server-test:ci \
            uv run pytest tests/ -v \
              --html=reports/report.html \
              --self-contained-html \
              --tb=short

      - name: Upload test report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: pytest-report
          path: reports/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────
  # Job 2: build final image and push to ghcr.io
  # Runs only on push to main (not on PRs)
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push production image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          target: app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
